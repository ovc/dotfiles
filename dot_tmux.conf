# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-boot 'on'

# Отключаем автоматическое сохранение сессий
set -g @continuum-save-interval '0'

# Убедитесь, что у вас ОТСУТСТВУЕТ или закомментирована следующая строка:
# set -g @continuum-restore 'on'

set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-indicator-str "  "

# Remove Vim mode delays
set -g focus-events on

# Enable full mouse support
set -g mouse on

# -----------------------------------------------------------------------------
# Configuration for quick start
# -----------------------------------------------------------------------------

# Change tmux to use a non-login shell (исправлены лишние кавычки)
set -g default-command "$SHELL"

# Убирает задержку команд
set -s escape-time 0

# Увеличивает отзывчивость интерфейса
set -g display-time 0

# Оптимизация обновления (раз в 15 секунд вместо 1)
set -g status-interval 15

# Отключаем агрессивное обновление заголовков терминала
set -g set-titles off

# Если вы используете терминал с поддержкой 256 цветов или TrueColor,
# явно укажите это, чтобы tmux не тратил время на попытки определения
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

# Отключаем визуальное оповещение о событиях в других окнах
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Unbind default keys
# unbind C-b
# unbind '"'
# unbind %

# --- Настройки интерфейса ---
set -g base-index 1           # Окна с 1
setw -g pane-base-index 1     # Панели с 1
set -g renumber-windows on    # Сдвигать индексы при закрытии

# --- Navigation ---
# --- Переключение между панелями (select) ---
# Использование: Ctrl-b -> h/j/k/l
bind h select-pane -L  # Влево
bind j select-pane -D  # Вниз
bind k select-pane -U  # Вверх
bind l select-pane -R  # Вправо

# Сворачивание/разворачивание панели на весь экран (Zoom)
# Теперь работает через Ctrl-b -> _
bind _ resize-pane -Z

# --- Создание элементов в домашней директории ---
bind c new-window -c "$HOME"      # Новое окно

# Разделение панелей
# Вертикальное разделение (панель сбоку)
bind | split-window -h -c "#{pane_current_path}"

# Горизонтальное разделение (панель снизу)
bind - split-window -v -c "#{pane_current_path}"

# --- Изменение размера панелей (resize) ---
# Использование: Ctrl-b -> зажать H/J/K/L (заглавные)
# Каждое нажатие изменяет размер на 5 ячеек
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind Tab last-window

# Включаем режим vi для работы с буфером (копирование/прокрутка)
setw -g mode-keys vi

# Split panes, vertical or horizontal
# bind-key x split-window -v
# bind-key v split-window -h

# Move around panes with vim-like bindings (h,j,k,l)
# bind-key -n M-k select-pane -U
# bind-key -n M-h select-pane -L
# bind-key -n M-j select-pane -D
# bind-key -n M-l select-pane -R

