# bind-key -T copy-mode-vi 'C-h' select-pane -L
# bind-key -T copy-mode-vi 'C-j' select-pane -D
# bind-key -T copy-mode-vi 'C-k' select-pane -U
# bind-key -T copy-mode-vi 'C-l' select-pane -R
# bind-key -T copy-mode-vi 'C-\' select-pane -l

# --- Настройка выделения текста в стиле Vim ---
# Теперь выделение можно начинать кнопкой 'v' (как в Vim), а не только пробелом
bind-key -T copy-mode-vi v send-keys -X begin-selection

# --- Универсальное копирование (macOS + Linux) ---
# Если это macOS (Darwin) - используем системный pbcopy
if-shell -b 'test "$(uname)" = "Darwin"' {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}

# Если это Linux - используем xclip
if-shell -b 'test "$(uname)" = "Linux"' {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
}

# =============================================================================
# Инициализация TMUX PLUGIN MANAGER (TPM)
# ВАЖНО: Эта строка всегда должна быть самой последней в файле .tmux.conf!
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
